version: "3"
services:
  app:
    build: .
    ports:
      - 5000:5000
    depends_on:
      - db
      - cache
  db:
    image: postgres:12
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testdb
    volumes:
      - db-data:/var/lib/postgresql/data
  cache:
    image: redis:6

volumes:
  db-data: